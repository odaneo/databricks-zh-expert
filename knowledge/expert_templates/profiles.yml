version: 1
profiles:
  - id: generic
    display_name: 通用 Databricks 顾问
    description: 使用与云平台无关的通用核心专家模板。
    cloud: neutral
    layers: [core]
    default: true
    prompt_defaults:
      databricks_qa: [medallion.standard, decision.ingestion_mode]
      ddl_generation: [deliverable.table_design, medallion.standard]
      mapping_generation: [deliverable.table_design, medallion.standard]
      sql_generation: [code.delta_merge_sql, code.gold_aggregation_sql]
      pyspark_generation: [code.quality_expectations_python]
      notebook_generation: [code.quality_expectations_python]
      workflow_design: [workflow.lakeflow_jobs, pipeline.lakeflow_sdp]
      proposal_generation: [deliverable.technical_proposal, deliverable.architecture_design]
      self_check: [checklist.production_readiness, checklist.data_quality]
  - id: retail_sales_demo
    display_name: AWS 零售销售 Demo
    description: 使用通用核心层，并允许 AWS 零售销售项目覆盖层提供项目假设。
    cloud: aws
    layers: [core, retail_sales_demo]
    default: false
    prompt_defaults:
      databricks_qa: [retail.project_context, retail.source_contracts]
      ddl_generation: [retail.medallion_mapping, retail.source_contracts]
      mapping_generation: [retail.medallion_mapping, retail.source_contracts]
      sql_generation: [retail.gold_data_products, code.delta_merge_sql]
      pyspark_generation: [retail.medallion_mapping, code.autoloader_pyspark]
      notebook_generation: [retail.source_contracts, code.autoloader_pyspark]
      workflow_design: [retail.workflow_dag, retail.end_to_end_architecture]
      proposal_generation: [retail.project_context, retail.end_to_end_architecture]
      self_check: [retail.production_acceptance]
