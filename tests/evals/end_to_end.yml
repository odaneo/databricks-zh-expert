  - id: nw_sql_daily_sales
    title: Northwind 每日净销售 SQL
    group: northwind
    prompt: sql_generation
    content: >-
      生成 Northwind 每日净销售额 Databricks SQL 草稿。连接 orders 与 order_details，按 orders.order_date 归属日期，
      行净销售额严格使用 unit_price * quantity * (1 - discount)，freight 不计入净销售额。
    expected:
      artifact_type: sql
      project_fact_status: proposal
      require_official_citations: true
      require_workspace_context: true
      workspace_unit_ids:
        - source_ddl.northwind.northwind-schema:7
        - source_ddl.northwind.northwind-schema:8
        - rules:4
      required_terms: [orders, order_details, order_date, unit_price, quantity, discount]
      required_any_term_groups: []
      forbidden_terms: []
      required_patterns:
        - '(?is)unit_price\s*\*\s*[^\n;]*quantity\s*\*\s*\(\s*1\s*-\s*[^\n;]*discount\s*\)'
      forbidden_patterns: []
      code_required_terms: [order_id, order_date, unit_price, quantity, discount]
      code_forbidden_terms: [store_id, order_line_id, currency_code]
      required_sections: []
      code_fence_language: sql
    soft_checks:
      suggested_terms: [SUM, GROUP BY]
      minimum_score: 1.0
    manual_review:
      required: true
      questions:
        - 是否正确连接 orders 与 order_details？
        - 是否严格遵守折扣、日期和 freight 口径？
        - SQL 是否适合继续进行人工项目评审？

