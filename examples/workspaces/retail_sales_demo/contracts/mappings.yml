schema_version: 1
project_id: retail_sales_demo
mock: true
description: AWS 零售销售 Mock 项目的源到目标映射，字段口径必须由真实项目确认。
mappings:
  - id: pos_sales_to_fact_sales
    source_kind: s3_pos
    source_tables: [bronze.pos_sales_raw]
    target_tables: [silver.fact_sales]
    description: 将门店 POS 销售行统一为 Silver 订单行事实。
    field_mappings:
      - {source: transaction_id, target: order_id, transform: 原值并增加 POS 来源命名空间}
      - {source: line_id, target: order_line_id, transform: 原值}
      - {source: sale_ts, target: order_ts, transform: 按 UTC TIMESTAMP 解析}
      - {source: business_date, target: business_date, transform: 原值}
      - {source: store_id, target: store_id, transform: 原值}
      - {source: product_id, target: product_id, transform: 原值}
      - {source: customer_id, target: customer_id, transform: 保留受控分析标识}
      - {source: gross_amount, target: gross_amount, transform: 转为 DECIMAL(18,2)}
      - {source: discount_amount, target: discount_amount, transform: 转为 DECIMAL(18,2)}
      - {source: net_amount, target: net_amount, transform: 转为 DECIMAL(18,2)}
      - {source: 固定值, target: channel, transform: 设为 store}
      - {source: 固定值, target: source_type, transform: 设为 pos}

  - id: dms_customer_to_dim_customer
    source_kind: rds_dms
    source_tables: [bronze.customer_cdc_raw]
    target_tables: [silver.dim_customer]
    description: 按 DMS 提交顺序维护客户 SCD2，并移除直接识别字段。
    field_mappings:
      - {source: customer_id, target: customer_id, transform: 原值}
      - {source: email, target: masked_email, transform: 只保留不可逆掩码结果}
      - {source: phone, target: masked_phone, transform: 只保留末尾受控片段}
      - {source: loyalty_tier, target: loyalty_tier, transform: 规范化枚举}
      - {source: loyalty_tier, target: customer_segment, transform: 使用待确认分群规则}
      - {source: _dms_commit_ts, target: effective_from, transform: 作为 SCD 生效时间}
      - {source: _dms_commit_ts, target: source_commit_ts, transform: 原值}

  - id: dms_product_to_dim_product
    source_kind: rds_dms
    source_tables: [bronze.product_cdc_raw]
    target_tables: [silver.dim_product]
    description: 按 DMS 提交顺序维护商品 SCD2。
    field_mappings:
      - {source: product_id, target: product_id, transform: 原值}
      - {source: sku, target: sku, transform: 去除首尾空白}
      - {source: product_name, target: product_name, transform: 原值}
      - {source: category_id, target: category_id, transform: 原值}
      - {source: category_name, target: category_name, transform: 原值}
      - {source: unit_price, target: current_unit_price, transform: 转为 DECIMAL(18,2)}
      - {source: _dms_commit_ts, target: effective_from, transform: 作为 SCD 生效时间}

  - id: dms_store_to_dim_store
    source_kind: rds_dms
    source_tables: [bronze.store_cdc_raw]
    target_tables: [silver.dim_store]
    description: 按 DMS 提交顺序维护门店 SCD2 和业务时区。
    field_mappings:
      - {source: store_id, target: store_id, transform: 原值}
      - {source: store_name, target: store_name, transform: 原值}
      - {source: region_code, target: region_code, transform: 规范化大写代码}
      - {source: timezone, target: timezone, transform: 校验 IANA 时区名称}
      - {source: _dms_commit_ts, target: effective_from, transform: 作为 SCD 生效时间}

  - id: dms_inventory_to_fact_inventory
    source_kind: rds_dms
    source_tables: [bronze.inventory_cdc_raw]
    target_tables: [silver.fact_inventory]
    description: 将库存 CDC 转换为门店商品时点事实。
    field_mappings:
      - {source: snapshot_ts, target: snapshot_ts, transform: 按 UTC TIMESTAMP 解析}
      - {source: snapshot_ts, target: business_date, transform: 按门店时区转换日期}
      - {source: store_id, target: store_id, transform: 原值}
      - {source: product_id, target: product_id, transform: 原值}
      - {source: on_hand_quantity, target: on_hand_quantity, transform: 转为 DECIMAL(18,3)}
      - {source: reserved_quantity, target: reserved_quantity, transform: 转为 DECIMAL(18,3)}
      - {source: on_hand_quantity - reserved_quantity, target: available_quantity, transform: 最低保留源异常值供质量检查}
      - {source: _dms_commit_ts, target: source_commit_ts, transform: 原值}

  - id: kinesis_order_to_fact_sales
    source_kind: kinesis
    source_tables: [bronze.ecommerce_events_raw]
    target_tables: [silver.fact_sales]
    description: 将订单行、退款和取消事件统一到 Silver 销售事实。
    field_mappings:
      - {source: order_id, target: order_id, transform: 原值}
      - {source: order_line_id, target: order_line_id, transform: 原值}
      - {source: event_ts, target: order_ts, transform: 使用订单创建事件时间}
      - {source: event_ts, target: business_date, transform: 按销售归属时区转换日期}
      - {source: store_id, target: store_id, transform: 缺失时使用待确认的线上归属门店分析键}
      - {source: product_id, target: product_id, transform: 原值}
      - {source: customer_id, target: customer_id, transform: 保留受控分析标识}
      - {source: channel, target: channel, transform: 规范化 web、app、marketplace}
      - {source: quantity, target: quantity, transform: 转为 DECIMAL(18,3)}
      - {source: gross_amount, target: gross_amount, transform: 转为 DECIMAL(18,2)}
      - {source: discount_amount, target: discount_amount, transform: 转为 DECIMAL(18,2)}
      - {source: net_amount, target: net_amount, transform: 转为 DECIMAL(18,2)}
      - {source: currency_code, target: currency_code, transform: 规范化大写代码}
      - {source: event_type, target: is_return, transform: return_completed 时为 true}
      - {source: event_type, target: is_cancelled, transform: order_cancelled 时为 true}
      - {source: event_id, target: source_event_id, transform: 原值}
      - {source: 固定值, target: source_type, transform: 设为 ecommerce}

  - id: kinesis_behavior_to_fact_customer_behavior
    source_kind: kinesis
    source_tables: [bronze.ecommerce_events_raw]
    target_tables: [silver.fact_customer_behavior]
    description: 将浏览、加购和转化事件整理为去重行为事实。
    field_mappings:
      - {source: event_id, target: event_id, transform: 作为幂等键}
      - {source: payload.session_id, target: session_id, transform: 从受控 payload 字段解析}
      - {source: event_ts, target: event_ts, transform: 原值}
      - {source: event_ts, target: business_date, transform: 按业务时区转换日期}
      - {source: event_type, target: event_type, transform: 规范化事件枚举}
      - {source: payload.device_type, target: device_type, transform: 从受控 payload 字段解析}
      - {source: payload.campaign_code, target: campaign_code, transform: 从受控 payload 字段解析}
      - {source: order_id, target: converted_flag, transform: 存在有效订单关联时为 true}

  - id: silver_sales_to_gold_daily_sales
    source_kind: silver
    source_tables: [silver.fact_sales]
    target_tables: [gold.daily_sales]
    description: 按日期、门店、渠道和商品聚合销售指标。
    field_mappings:
      - {source: business_date, target: business_date, transform: 分组字段}
      - {source: store_id, target: store_id, transform: 分组字段}
      - {source: channel, target: channel, transform: 分组字段}
      - {source: product_id, target: product_id, transform: 分组字段}
      - {source: gross_amount, target: gross_sales_amount, transform: 求和}
      - {source: discount_amount, target: discount_amount, transform: 求和}
      - {source: net_amount, target: net_sales_amount, transform: 排除取消并按退款规则求和}
      - {source: order_id, target: order_count, transform: 去重计数}
      - {source: quantity, target: sales_quantity, transform: 按退货符号求和}

  - id: silver_sales_to_gold_product_performance
    source_kind: silver
    source_tables: [silver.fact_sales, silver.dim_product]
    target_tables: [gold.product_performance]
    description: 形成商品销量、退货率、折扣率和品类排名。
    field_mappings:
      - {source: business_date, target: business_date, transform: 分组字段}
      - {source: product_id, target: product_id, transform: 分组字段}
      - {source: channel, target: channel, transform: 分组字段}
      - {source: dim_product.category_id, target: category_id, transform: 按事实发生时间关联有效维度}
      - {source: quantity, target: sales_quantity, transform: 非退货销售数量求和}
      - {source: quantity + is_return, target: return_quantity, transform: 退货数量绝对值求和}
      - {source: discount_amount / gross_amount, target: discount_rate, transform: 分母为零时返回 null}

  - id: silver_inventory_to_gold_inventory_health
    source_kind: silver
    source_tables: [silver.fact_inventory, silver.fact_sales]
    target_tables: [gold.inventory_health]
    description: 结合库存快照和近期销售计算库存健康指标。
    field_mappings:
      - {source: business_date, target: snapshot_date, transform: 使用日末有效库存日期}
      - {source: available_quantity, target: available_quantity, transform: 日末值}
      - {source: stockout_flag, target: stockout_flag, transform: 日末值}
      - {source: available_quantity / 近期日均销量, target: days_of_supply, transform: 无销量时返回 null}
      - {source: 期间销量 / 平均库存, target: inventory_turnover, transform: 分母为零时返回 null}

  - id: silver_customer_to_gold_customer_channel
    source_kind: silver
    source_tables: [silver.fact_sales, silver.fact_customer_behavior, silver.dim_customer]
    target_tables: [gold.customer_channel]
    description: 只按非直接识别客户分群和渠道发布聚合指标。
    field_mappings:
      - {source: business_date, target: business_date, transform: 分组字段}
      - {source: dim_customer.customer_segment, target: customer_segment, transform: 使用事实发生时间有效分群}
      - {source: channel, target: channel, transform: 分组字段}
      - {source: customer_id + 首购日期, target: new_customer_count, transform: 去重客户计数}
      - {source: customer_id + 历史订单, target: returning_customer_count, transform: 去重客户计数}
      - {source: converted_flag, target: conversion_rate, transform: 转化事件数除以有效会话数}
      - {source: 复购客户标识, target: repeat_purchase_rate, transform: 复购客户数除以购买客户数}
      - {source: net_amount, target: net_sales_amount, transform: 求和}
