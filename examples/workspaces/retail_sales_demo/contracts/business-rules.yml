schema_version: 1
project_id: retail_sales_demo
mock: true
description: AWS 零售销售 Mock 项目的处理与发布规则，阈值均需人工确认。
rules:
  - id: dms_operation_semantics
    category: cdc
    applies_to:
      - bronze.customer_cdc_raw
      - bronze.product_cdc_raw
      - bronze.store_cdc_raw
      - bronze.inventory_cdc_raw
    decision: _dms_op 只允许 I、U、D；D 必须保留删除语义，不能直接丢弃记录。
    confirmation: 核对 AWS DMS 实际操作字段名称和 full load 初始值。

  - id: dms_commit_order
    category: cdc
    applies_to:
      - silver.dim_customer
      - silver.dim_product
      - silver.dim_store
      - silver.fact_inventory
    decision: 同一业务键按 _dms_commit_ts、_ingest_ts、_source_file 排序后保留确定版本，不能使用文件到达顺序代替提交顺序。
    confirmation: 核对同一提交时间内的稳定排序字段和跨文件事务边界。

  - id: kinesis_event_idempotency
    category: streaming
    applies_to:
      - bronze.ecommerce_events_raw
      - silver.fact_sales
      - silver.fact_customer_behavior
    decision: event_id 是幂等键；Silver 在 24 小时 Mock 水位内去重，Bronze 保留重复原始事件供审计。
    confirmation: 核对生产者重试语义、迟到分布和正式水位。

  - id: kinesis_event_time
    category: streaming
    applies_to: [bronze.ecommerce_events_raw, silver.fact_customer_behavior]
    decision: event_ts 使用 UTC TIMESTAMP；_ingest_ts 只用于延迟监控，不能替代业务事件时间。
    confirmation: 确认所有生产者事件版本和时区约定。

  - id: pos_file_idempotency
    category: batch
    applies_to: [bronze.pos_sales_raw, silver.fact_sales]
    decision: 使用 _source_file、source_record_hash 和业务键识别重送文件与重复销售行，补档不能覆盖原始批次证据。
    confirmation: 核对文件命名、校验值、补档和空批次规则。

  - id: rescued_data_gate
    category: data_quality
    applies_to:
      - bronze.pos_sales_raw
      - bronze.customer_cdc_raw
      - bronze.product_cdc_raw
      - bronze.store_cdc_raw
      - bronze.inventory_cdc_raw
      - bronze.ecommerce_events_raw
    decision: _rescued_data 非空的记录保留在 Bronze 并进入质量统计，不允许静默进入 Silver。
    confirmation: 确认隔离、修复、重放和保留期限。

  - id: sales_amount_equation
    category: metric
    applies_to: [silver.fact_sales, gold.daily_sales, gold.product_performance]
    decision: 正常销售满足 net_amount = gross_amount - discount_amount；税费、运费和币种转换不在 Mock 公式内。
    confirmation: 由财务确认退款、税费、运费、优惠分摊和多币种口径。

  - id: return_and_cancel
    category: metric
    applies_to: [silver.fact_sales, gold.daily_sales, gold.product_performance]
    decision: 取消订单不计销售；完成退货以 is_return 标识并按确认后的符号影响净销售额和销量。
    confirmation: 确认部分退货、跨日退款和原订单关联方式。

  - id: inventory_availability
    category: metric
    applies_to: [silver.fact_inventory, gold.inventory_health]
    decision: available_quantity = on_hand_quantity - reserved_quantity；负值保留并触发质量问题，不能静默截断为零。
    confirmation: 确认在途、损耗、预留释放和缺货阈值。

  - id: customer_pii_boundary
    category: governance
    applies_to: [bronze.customer_cdc_raw, silver.dim_customer, gold.customer_channel]
    decision: Bronze 直接识别字段仅限受控访问；Silver 只保存掩码联系方式；Gold 不保存姓名、邮箱、手机号或地址。
    confirmation: 由治理负责人确认掩码、保留、删除请求和访问组。

  - id: business_date_timezone
    category: time
    applies_to: [silver.fact_sales, silver.fact_inventory, silver.fact_customer_behavior]
    decision: 原始事件时间统一保存 UTC；business_date 按已确认的门店或销售归属时区计算。
    confirmation: 确认无门店电商订单的默认时区、日界线和夏令时处理。

  - id: gold_publish_gate
    category: sla
    applies_to:
      - gold.daily_sales
      - gold.product_performance
      - gold.inventory_health
      - gold.customer_channel
    decision: POS 假设 05:00 到达，Gold 在 07:00 前完成更新；只有主键、金额对账、PII 列和新鲜度检查通过后才可在 07:30 标记为可查询。
    confirmation: Mock SLA 不代表验收结果，真实项目必须提供测量证据和业务签字。
