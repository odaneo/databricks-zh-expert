schema_version: 1
project_id: retail_sales_demo
mock: true
description: AWS 零售销售 Mock 项目的 16 张逻辑表契约，不能视为已部署对象。
conventions:
  amount_type: DECIMAL(18,2)
  quantity_type: DECIMAL(18,3)
  event_time_type: TIMESTAMP
  event_timezone: UTC
  direct_pii_boundary: 仅受限 Bronze 可以保存虚构直接识别信息
tables:
  - name: bronze.pos_sales_raw
    layer: bronze
    description: 保存 S3 POS 日批中的原始销售行和文件摄取元数据。
    grain: 每个 business_date、store_id、transaction_id 与 line_id 一行
    source_tables: [source.s3_pos_sales]
    keys: [business_date, store_id, transaction_id, line_id]
    partition_by: [business_date]
    cluster_by: [store_id, transaction_id]
    columns:
      - {name: business_date, type: DATE, nullable: false, pii: none}
      - {name: store_id, type: STRING, nullable: false, pii: none}
      - {name: transaction_id, type: STRING, nullable: false, pii: none}
      - {name: line_id, type: STRING, nullable: false, pii: none}
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: customer_id, type: STRING, nullable: true, pii: pseudonymous}
      - {name: quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: gross_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: discount_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: net_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: currency_code, type: STRING, nullable: false, pii: none}
      - {name: sale_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _ingest_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _source_file, type: STRING, nullable: false, pii: none}
      - {name: _rescued_data, type: STRING, nullable: true, pii: restricted}
      - {name: source_record_hash, type: STRING, nullable: false, pii: none}

  - name: bronze.customer_cdc_raw
    layer: bronze
    description: 保存 RDS customer 经 AWS DMS 落地的 full load 与 CDC 原始记录。
    grain: 每个 customer_id、_dms_commit_ts 与 _dms_op 一行
    source_tables: [source.rds_customer]
    keys: [customer_id, _dms_commit_ts, _dms_op]
    partition_by: []
    cluster_by: [customer_id, _dms_commit_ts]
    columns:
      - {name: customer_id, type: STRING, nullable: false, pii: pseudonymous}
      - {name: full_name, type: STRING, nullable: true, pii: direct}
      - {name: email, type: STRING, nullable: true, pii: direct}
      - {name: phone, type: STRING, nullable: true, pii: direct}
      - {name: address, type: STRING, nullable: true, pii: direct}
      - {name: loyalty_tier, type: STRING, nullable: true, pii: none}
      - {name: created_at, type: TIMESTAMP, nullable: true, pii: none}
      - {name: updated_at, type: TIMESTAMP, nullable: true, pii: none}
      - {name: _dms_op, type: STRING, nullable: false, pii: none}
      - {name: _dms_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _ingest_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _source_file, type: STRING, nullable: false, pii: none}
      - {name: _rescued_data, type: STRING, nullable: true, pii: restricted}

  - name: bronze.product_cdc_raw
    layer: bronze
    description: 保存 RDS product 经 AWS DMS 落地的商品变更原始记录。
    grain: 每个 product_id、_dms_commit_ts 与 _dms_op 一行
    source_tables: [source.rds_product]
    keys: [product_id, _dms_commit_ts, _dms_op]
    partition_by: []
    cluster_by: [product_id, _dms_commit_ts]
    columns:
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: sku, type: STRING, nullable: false, pii: none}
      - {name: product_name, type: STRING, nullable: false, pii: none}
      - {name: category_id, type: STRING, nullable: false, pii: none}
      - {name: category_name, type: STRING, nullable: false, pii: none}
      - {name: brand, type: STRING, nullable: true, pii: none}
      - {name: unit_price, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: active_flag, type: BOOLEAN, nullable: false, pii: none}
      - {name: updated_at, type: TIMESTAMP, nullable: true, pii: none}
      - {name: _dms_op, type: STRING, nullable: false, pii: none}
      - {name: _dms_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _ingest_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _source_file, type: STRING, nullable: false, pii: none}
      - {name: _rescued_data, type: STRING, nullable: true, pii: restricted}

  - name: bronze.store_cdc_raw
    layer: bronze
    description: 保存 RDS store 经 AWS DMS 落地的门店变更原始记录。
    grain: 每个 store_id、_dms_commit_ts 与 _dms_op 一行
    source_tables: [source.rds_store]
    keys: [store_id, _dms_commit_ts, _dms_op]
    partition_by: []
    cluster_by: [store_id, _dms_commit_ts]
    columns:
      - {name: store_id, type: STRING, nullable: false, pii: none}
      - {name: store_name, type: STRING, nullable: false, pii: none}
      - {name: region_code, type: STRING, nullable: false, pii: none}
      - {name: timezone, type: STRING, nullable: false, pii: none}
      - {name: opened_date, type: DATE, nullable: true, pii: none}
      - {name: active_flag, type: BOOLEAN, nullable: false, pii: none}
      - {name: updated_at, type: TIMESTAMP, nullable: true, pii: none}
      - {name: _dms_op, type: STRING, nullable: false, pii: none}
      - {name: _dms_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _ingest_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _source_file, type: STRING, nullable: false, pii: none}
      - {name: _rescued_data, type: STRING, nullable: true, pii: restricted}

  - name: bronze.inventory_cdc_raw
    layer: bronze
    description: 保存 RDS inventory 经 AWS DMS 落地的门店商品库存变更。
    grain: 每个 store_id、product_id、_dms_commit_ts 与 _dms_op 一行
    source_tables: [source.rds_inventory]
    keys: [store_id, product_id, _dms_commit_ts, _dms_op]
    partition_by: []
    cluster_by: [store_id, product_id, _dms_commit_ts]
    columns:
      - {name: store_id, type: STRING, nullable: false, pii: none}
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: on_hand_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: reserved_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: reorder_point, type: "DECIMAL(18,3)", nullable: true, pii: none}
      - {name: snapshot_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: updated_at, type: TIMESTAMP, nullable: true, pii: none}
      - {name: _dms_op, type: STRING, nullable: false, pii: none}
      - {name: _dms_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _ingest_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _source_file, type: STRING, nullable: false, pii: none}
      - {name: _rescued_data, type: STRING, nullable: true, pii: restricted}

  - name: bronze.ecommerce_events_raw
    layer: bronze
    description: 保存 Kinesis 订单、支付和客户行为事件及流式摄取元数据。
    grain: 每个 event_id 一行，重复事件保留到清洗步骤判定
    source_tables: [source.kinesis_ecommerce]
    keys: [event_id]
    partition_by: []
    cluster_by: [event_type, event_ts]
    columns:
      - {name: event_id, type: STRING, nullable: false, pii: none}
      - {name: event_type, type: STRING, nullable: false, pii: none}
      - {name: event_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: order_id, type: STRING, nullable: true, pii: none}
      - {name: order_line_id, type: STRING, nullable: true, pii: none}
      - {name: customer_id, type: STRING, nullable: true, pii: pseudonymous}
      - {name: product_id, type: STRING, nullable: true, pii: none}
      - {name: store_id, type: STRING, nullable: true, pii: none}
      - {name: channel, type: STRING, nullable: false, pii: none}
      - {name: quantity, type: "DECIMAL(18,3)", nullable: true, pii: none}
      - {name: gross_amount, type: "DECIMAL(18,2)", nullable: true, pii: none}
      - {name: discount_amount, type: "DECIMAL(18,2)", nullable: true, pii: none}
      - {name: net_amount, type: "DECIMAL(18,2)", nullable: true, pii: none}
      - {name: currency_code, type: STRING, nullable: true, pii: none}
      - {name: payload, type: STRING, nullable: false, pii: restricted}
      - {name: kinesis_partition_key, type: STRING, nullable: false, pii: none}
      - {name: kinesis_sequence_number, type: STRING, nullable: false, pii: none}
      - {name: _ingest_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _rescued_data, type: STRING, nullable: true, pii: restricted}

  - name: silver.dim_customer
    layer: silver
    description: 保存脱敏客户属性与 SCD2 生效区间。
    grain: 每个 customer_id 与 effective_from 一行
    source_tables: [bronze.customer_cdc_raw]
    keys: [customer_id, effective_from]
    partition_by: []
    cluster_by: [customer_id, is_current]
    columns:
      - {name: customer_id, type: STRING, nullable: false, pii: pseudonymous}
      - {name: masked_email, type: STRING, nullable: true, pii: masked}
      - {name: masked_phone, type: STRING, nullable: true, pii: masked}
      - {name: loyalty_tier, type: STRING, nullable: true, pii: none}
      - {name: customer_segment, type: STRING, nullable: true, pii: none}
      - {name: effective_from, type: TIMESTAMP, nullable: false, pii: none}
      - {name: effective_to, type: TIMESTAMP, nullable: true, pii: none}
      - {name: is_current, type: BOOLEAN, nullable: false, pii: none}
      - {name: source_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _processed_ts, type: TIMESTAMP, nullable: false, pii: none}

  - name: silver.dim_product
    layer: silver
    description: 保存商品主数据与 SCD2 生效区间。
    grain: 每个 product_id 与 effective_from 一行
    source_tables: [bronze.product_cdc_raw]
    keys: [product_id, effective_from]
    partition_by: []
    cluster_by: [product_id, is_current]
    columns:
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: sku, type: STRING, nullable: false, pii: none}
      - {name: product_name, type: STRING, nullable: false, pii: none}
      - {name: category_id, type: STRING, nullable: false, pii: none}
      - {name: category_name, type: STRING, nullable: false, pii: none}
      - {name: brand, type: STRING, nullable: true, pii: none}
      - {name: current_unit_price, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: active_flag, type: BOOLEAN, nullable: false, pii: none}
      - {name: effective_from, type: TIMESTAMP, nullable: false, pii: none}
      - {name: effective_to, type: TIMESTAMP, nullable: true, pii: none}
      - {name: is_current, type: BOOLEAN, nullable: false, pii: none}
      - {name: source_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _processed_ts, type: TIMESTAMP, nullable: false, pii: none}

  - name: silver.dim_store
    layer: silver
    description: 保存门店属性与 SCD2 生效区间。
    grain: 每个 store_id 与 effective_from 一行
    source_tables: [bronze.store_cdc_raw]
    keys: [store_id, effective_from]
    partition_by: []
    cluster_by: [store_id, is_current]
    columns:
      - {name: store_id, type: STRING, nullable: false, pii: none}
      - {name: store_name, type: STRING, nullable: false, pii: none}
      - {name: region_code, type: STRING, nullable: false, pii: none}
      - {name: timezone, type: STRING, nullable: false, pii: none}
      - {name: opened_date, type: DATE, nullable: true, pii: none}
      - {name: active_flag, type: BOOLEAN, nullable: false, pii: none}
      - {name: effective_from, type: TIMESTAMP, nullable: false, pii: none}
      - {name: effective_to, type: TIMESTAMP, nullable: true, pii: none}
      - {name: is_current, type: BOOLEAN, nullable: false, pii: none}
      - {name: source_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _processed_ts, type: TIMESTAMP, nullable: false, pii: none}

  - name: silver.fact_sales
    layer: silver
    description: 统一 POS 与电商订单行粒度的销售事实。
    grain: 每个 order_id 与 order_line_id 一行
    source_tables: [bronze.pos_sales_raw, bronze.ecommerce_events_raw]
    keys: [order_id, order_line_id]
    partition_by: [business_date]
    cluster_by: [store_id, product_id, customer_id]
    columns:
      - {name: order_id, type: STRING, nullable: false, pii: none}
      - {name: order_line_id, type: STRING, nullable: false, pii: none}
      - {name: business_date, type: DATE, nullable: false, pii: none}
      - {name: order_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: store_id, type: STRING, nullable: true, pii: none}
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: customer_id, type: STRING, nullable: true, pii: pseudonymous}
      - {name: channel, type: STRING, nullable: false, pii: none}
      - {name: quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: gross_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: discount_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: net_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: currency_code, type: STRING, nullable: false, pii: none}
      - {name: is_return, type: BOOLEAN, nullable: false, pii: none}
      - {name: is_cancelled, type: BOOLEAN, nullable: false, pii: none}
      - {name: source_type, type: STRING, nullable: false, pii: none}
      - {name: source_event_id, type: STRING, nullable: true, pii: none}
      - {name: _processed_ts, type: TIMESTAMP, nullable: false, pii: none}

  - name: silver.fact_inventory
    layer: silver
    description: 保存门店商品库存时点事实和缺货判断基础字段。
    grain: 每个 snapshot_ts、store_id 与 product_id 一行
    source_tables: [bronze.inventory_cdc_raw]
    keys: [snapshot_ts, store_id, product_id]
    partition_by: [business_date]
    cluster_by: [store_id, product_id]
    columns:
      - {name: snapshot_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: business_date, type: DATE, nullable: false, pii: none}
      - {name: store_id, type: STRING, nullable: false, pii: none}
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: on_hand_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: reserved_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: available_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: reorder_point, type: "DECIMAL(18,3)", nullable: true, pii: none}
      - {name: stockout_flag, type: BOOLEAN, nullable: false, pii: none}
      - {name: source_commit_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: _processed_ts, type: TIMESTAMP, nullable: false, pii: none}

  - name: silver.fact_customer_behavior
    layer: silver
    description: 保存去重后的客户行为事件和订单转化关联结果。
    grain: 每个 event_id 一行
    source_tables: [bronze.ecommerce_events_raw]
    keys: [event_id]
    partition_by: [business_date]
    cluster_by: [customer_id, session_id, event_type]
    columns:
      - {name: event_id, type: STRING, nullable: false, pii: none}
      - {name: session_id, type: STRING, nullable: true, pii: pseudonymous}
      - {name: event_ts, type: TIMESTAMP, nullable: false, pii: none}
      - {name: business_date, type: DATE, nullable: false, pii: none}
      - {name: customer_id, type: STRING, nullable: true, pii: pseudonymous}
      - {name: channel, type: STRING, nullable: false, pii: none}
      - {name: event_type, type: STRING, nullable: false, pii: none}
      - {name: product_id, type: STRING, nullable: true, pii: none}
      - {name: order_id, type: STRING, nullable: true, pii: none}
      - {name: device_type, type: STRING, nullable: true, pii: none}
      - {name: campaign_code, type: STRING, nullable: true, pii: none}
      - {name: converted_flag, type: BOOLEAN, nullable: false, pii: none}
      - {name: _processed_ts, type: TIMESTAMP, nullable: false, pii: none}

  - name: gold.daily_sales
    layer: gold
    description: 发布日期、门店、渠道、商品粒度的每日销售指标。
    grain: 每个 business_date、store_id、channel 与 product_id 一行
    source_tables: [silver.fact_sales]
    keys: [business_date, store_id, channel, product_id]
    partition_by: [business_date]
    cluster_by: [store_id, channel, product_id]
    columns:
      - {name: business_date, type: DATE, nullable: false, pii: none}
      - {name: store_id, type: STRING, nullable: false, pii: none}
      - {name: channel, type: STRING, nullable: false, pii: none}
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: gross_sales_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: discount_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: net_sales_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: refund_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: order_count, type: BIGINT, nullable: false, pii: none}
      - {name: sales_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: average_order_value, type: "DECIMAL(18,2)", nullable: true, pii: none}
      - {name: refreshed_at, type: TIMESTAMP, nullable: false, pii: none}
      - {name: quality_status, type: STRING, nullable: false, pii: none}

  - name: gold.product_performance
    layer: gold
    description: 发布日期、商品、渠道粒度的销售、退货与折扣表现。
    grain: 每个 business_date、product_id 与 channel 一行
    source_tables: [silver.fact_sales, silver.dim_product]
    keys: [business_date, product_id, channel]
    partition_by: [business_date]
    cluster_by: [product_id, channel]
    columns:
      - {name: business_date, type: DATE, nullable: false, pii: none}
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: channel, type: STRING, nullable: false, pii: none}
      - {name: category_id, type: STRING, nullable: false, pii: none}
      - {name: gross_sales_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: net_sales_amount, type: "DECIMAL(18,2)", nullable: false, pii: none}
      - {name: sales_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: return_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: return_rate, type: "DECIMAL(18,6)", nullable: true, pii: none}
      - {name: discount_rate, type: "DECIMAL(18,6)", nullable: true, pii: none}
      - {name: category_rank, type: BIGINT, nullable: true, pii: none}
      - {name: refreshed_at, type: TIMESTAMP, nullable: false, pii: none}
      - {name: quality_status, type: STRING, nullable: false, pii: none}

  - name: gold.inventory_health
    layer: gold
    description: 发布库存日期、门店、商品粒度的库存健康指标。
    grain: 每个 snapshot_date、store_id 与 product_id 一行
    source_tables: [silver.fact_inventory, silver.fact_sales]
    keys: [snapshot_date, store_id, product_id]
    partition_by: [snapshot_date]
    cluster_by: [store_id, product_id]
    columns:
      - {name: snapshot_date, type: DATE, nullable: false, pii: none}
      - {name: store_id, type: STRING, nullable: false, pii: none}
      - {name: product_id, type: STRING, nullable: false, pii: none}
      - {name: available_quantity, type: "DECIMAL(18,3)", nullable: false, pii: none}
      - {name: reorder_point, type: "DECIMAL(18,3)", nullable: true, pii: none}
      - {name: stockout_flag, type: BOOLEAN, nullable: false, pii: none}
      - {name: days_of_supply, type: "DECIMAL(18,3)", nullable: true, pii: none}
      - {name: inventory_turnover, type: "DECIMAL(18,6)", nullable: true, pii: none}
      - {name: refreshed_at, type: TIMESTAMP, nullable: false, pii: none}
      - {name: quality_status, type: STRING, nullable: false, pii: none}

  - name: gold.customer_channel
    layer: gold
    description: 发布日期、非直接识别客户分群、渠道粒度的客户指标。
    grain: 每个 business_date、customer_segment 与 channel 一行
    source_tables: [silver.fact_sales, silver.fact_customer_behavior, silver.dim_customer]
    keys: [business_date, customer_segment, channel]
    partition_by: [business_date]
    cluster_by: [customer_segment, channel]
    columns:
      - {name: business_date, type: DATE, nullable: false, pii: none}
      - {name: customer_segment, type: STRING, nullable: false, pii: none}
      - {name: channel, type: STRING, nullable: false, pii: none}
